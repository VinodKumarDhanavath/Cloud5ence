name: Deploy cloud5ence.com to AWS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    name: Sync to S3 + Invalidate CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Sync website files to S3
        run: |
          aws s3 sync ./Cloud5ence_v1/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.jpeg" \
            --include "*.pdf" \
            --include "*.svg" \
            --include "*.ico" \
            --cache-control "public, max-age=0, must-revalidate"
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invali       \          aws -distri          aws clorets.CLOUD      DISTRIBUTION_ID }} \
            --paths "/*"
                            un: echo "Dep                     om"
